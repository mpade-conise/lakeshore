<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512"
     height="512">

    <defs>
        <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00C6FF"/>
            <stop offset="100%" stop-color="#0072FF"/>
        </linearGradient>

        <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#444"/>
            <stop offset="100%" stop-color="#111"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="512" height="512"
          rx="90"
          fill="#071421"/>

    <!-- Location Pin -->
    <path
        d="M256 70
           C196 70 150 116 150 176
           C150 260 256 360 256 360
           C256 360 362 260 362 176
           C362 116 316 70 256 70Z"
        fill="url(#mainGradient)"
        filter="url(#glow)"/>

    <!-- Pin Center -->
    <circle
        cx="256"
        cy="176"
        r="55"
        fill="#071421"/>

    <!-- Bus -->
    <rect
        x="208"
        y="150"
        width="96"
        height="50"
        rx="12"
        fill="url(#mainGradient)"/>

    <rect
        x="220"
        y="160"
        width="22"
        height="16"
        rx="2"
        fill="white"/>

    <rect
        x="247"
        y="160"
        width="22"
        height="16"
        rx="2"
        fill="white"/>

    <rect
        x="274"
        y="160"
        width="22"
        height="16"
        rx="2"
        fill="white"/>

    <circle
        cx="226"
        cy="205"
        r="8"
        fill="#071421"/>

    <circle
        cx="286"
        cy="205"
        r="8"
        fill="#071421"/>

    <!-- Road -->
    <path
        d="M220 360
           C240 390 245 430 235 512
           L277 512
           C267 430 272 390 292 360"
        fill="url(#roadGradient)"/>

    <!-- Road Markings -->
    <rect
        x="252"
        y="380"
        width="8"
        height="20"
        fill="#FFD54F"/>

    <rect
        x="252"
        y="415"
        width="8"
        height="20"
        fill="#FFD54F"/>

    <rect
        x="252"
        y="450"
        width="8"
        height="20"
        fill="#FFD54F"/>

</svg>
